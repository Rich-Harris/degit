name: Performance

on: [pull_request, push, workflow_dispatch]

jobs:
    performance:
        name: performance
        permissions:
            contents: read

        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - uses: actions/checkout@v5

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - run: bun --version

            - name: Use Node.js LTS
              uses: actions/setup-node@v5
              with:
                  node-version: lts/*

            - run: bun install --frozen-lockfile
            - run: bun run build
            - run: bun run perf:ci
