name: Quality

on:
    pull_request:
    push:

jobs:
    quality:
        name: Quality
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - run: bun --version

            - name: Use Node.js LTS
              uses: actions/setup-node@v5
              with:
                  node-version: lts/*

            - run: bun install --frozen-lockfile
            - run: bun run lint:ci
            - run: bun run format:ci
            - run: bun run duplicates:ci
            - run: bun run knip:ci
