name: E2E

on:
    workflow_dispatch:
    schedule:
        - cron: '0 2 * * *'

jobs:
    e2e:
        name: e2e (${{ matrix.os }})
        permissions:
            contents: read
        env:
            SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
            DEGIT_TEST_MODE: release

        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]

        runs-on: ${{ matrix.os }}
        timeout-minutes: 30

        steps:
            - uses: actions/checkout@v5

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - run: bun --version

            - name: Use Node.js LTS
              uses: actions/setup-node@v5
              with:
                  node-version: lts/*

            - name: Start SSH agent for private live tests
              if: "${{ env.SSH_PRIVATE_KEY != '' }}"
              uses: webfactory/ssh-agent@v0.9.0
              with:
                  ssh-private-key: ${{ env.SSH_PRIVATE_KEY }}

            - name: Trust SSH hosts used by live tests
              if: "${{ env.SSH_PRIVATE_KEY != '' }}"
              shell: bash
              run: |
                  mkdir -p ~/.ssh
                  ssh-keyscan github.com gitlab.com bitbucket.org git.sr.ht >> ~/.ssh/known_hosts

            - run: bun install --frozen-lockfile

            - run: bun run test:integration:release
