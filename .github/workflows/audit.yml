name: Audit

on:
    pull_request:
    schedule:
        - cron: '30 2 * * 0'

jobs:
    audit:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - run: bun --version

            - run: bun install --frozen-lockfile

            - run: bun run audit
