name: Security

on:
    pull_request:
    schedule:
        - cron: '30 2 * * 0'
        - cron: '30 1 * * 6'

jobs:
    audit:
        if: github.event_name == 'pull_request' || github.event.schedule == '30 2 * * 0'
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - run: bun --version

            - run: bun install --frozen-lockfile

            - run: bun run audit

    codeql:
        if: (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'master') || github.event.schedule == '30 1 * * 6'
        name: Analyze (${{ matrix.language }})
        runs-on: ubuntu-latest
        permissions:
            security-events: write

            packages: read

            actions: read
            contents: read

        strategy:
            fail-fast: false
            matrix:
                include:
                    - language: javascript-typescript
                      build-mode: none

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v4
              with:
                  languages: ${{ matrix.language }}
                  build-mode: ${{ matrix.build-mode }}

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v4
              with:
                  category: '/language:${{matrix.language}}'

    pentest:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Install Strix
              run: curl -sSL https://strix.ai/install | bash

            - name: Run Strix
              env:
                  STRIX_LLM: ${{ secrets.STRIX_LLM }}
                  LLM_API_KEY: ${{ secrets.STRIX_LLM_API_KEY }}
              run: strix -n -t ./ --scan-mode quick
